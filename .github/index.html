<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갯벌 위치 찾기 게임</title>
    <style>
        @font-face {
            font-family: 'NexonMaplestory';
            src: url('https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_20-04@2.1/MaplestoryOTFBold.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-color: #e3f2fd;
            --main-green: #2d5a27;
            --point-red: #ff6b6b;
            --dark-gray: #343a40;
            --success-green: #2ecc71;
        }

        body {
            font-family: 'NexonMaplestory', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 10px 0;
            font-size: 2.5rem;
            color: var(--dark-gray);
            text-shadow: 2px 2px 0px white;
        }

        .container {
            display: flex;
            width: 98%;
            height: 85vh;
            gap: 15px;
            justify-content: center;
        }

        /* 1. 지도 영역 */
        #map-area {
            position: relative;
            flex: 1.2;
            max-width: 750px;
            background: url('./백지도.jpg') no-repeat center center;
            background-size: contain;
            border: 5px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 25px;
            background-color: white;
        }

        #arrow-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 15;
        }

        /* 퀴즈 마커: 모핑 애니메이션의 핵심 */
        .marker {
            position: absolute;
            width: 60px;
            height: 60px;
            background-color: var(--point-red);
            color: white;
            border-radius: 30px; /* 원형 시작 */
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 2rem;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            z-index: 20;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            overflow: hidden;
            /* 애니메이션 설정 */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .marker.revealed {
            background-color: var(--success-green);
            width: 180px; /* 고정값으로 지정해야 부드럽게 늘어남 */
            height: 45px;
            border-radius: 15px;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.4);
        }

        .static-label {
            position: absolute;
            font-size: 0.9rem;
            color: #333;
            font-weight: bold;
            white-space: nowrap;
            z-index: 10;
            pointer-events: none;
            transform: translate(-50%, -50%);
        }
        .static-label span {
            background-color: rgb(250, 217, 173);
            padding: 4px 10px;
            border-radius: 20px;
            color: rgb(235, 66, 44);
        }

        /* 2. 컨트롤 패널 */
        #control-panel {
            flex: 0.8;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 25px;
        }

        .region-btn {
            padding: 18px;
            font-size: 1.6rem;
            font-family: 'NexonMaplestory';
            border: 3px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            background-color: #fff;
            transition: all 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.05);
        }
        .region-btn:hover { transform: translateX(10px); background: #f8f9fa; }

        /* 모바일 반응형 (768px 이하) */
        @media (max-width: 768px) {
            body { height: auto; overflow-y: auto; }
            h1 { font-size: 1.8rem; }
            .container { flex-direction: column; height: auto; }
            #map-area { height: 55vh; width: 100%; flex: none; }
            #control-panel {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 5px;
                padding: 10px;
            }
            #control-panel h2, #control-panel div { display: none; }
            .region-btn { font-size: 0.85rem; padding: 12px 2px; }
            .marker { width: 45px; height: 45px; font-size: 1.5rem; }
            .marker.revealed { width: 110px; height: 35px; font-size: 0.8rem; }
        }

        /* 힌트 모달 */
        #hint-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center;
        }
        #hint-content { background: white; padding: 25px; border-radius: 30px; text-align: center; width: 90%; max-width: 700px; }
        .hint-img { width: 100%; height: 45vh; object-fit: contain; border-radius: 15px; margin-bottom: 15px; }
        .btn { padding: 15px; font-size: 1.2rem; border-radius: 12px; border: none; font-family: 'NexonMaplestory'; width: 100%; cursor: pointer; }
        .btn-next { background: #2ecc71; color: white; margin-bottom: 8px; }
        .btn-close { background: #ee5253; color: white; }
        #answer-toast { position: fixed; bottom: 20px; background: rgba(0,0,0,0.8); color: white; padding: 15px 30px; border-radius: 40px; font-size: 1.5rem; display: none; z-index: 200; }


/* 1. 마커 기본 상태 (쫀득한 트랜지션 유지) */
.marker {
    position: absolute;
    width: 60px;
    height: 60px;
    background-color: var(--point-red);
    color: white;
    border-radius: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 2rem;
    box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
    z-index: 20;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    overflow: hidden;
    /* 모든 변화에 0.5초간 쫀득한 효과 부여 */
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* 2. 마우스 호버(Hover) 시 애니메이션 효과 */
.marker:not(.revealed):hover {
    transform: translate(-50%, -50%) scale(1.2); /* 1.2배 커짐 */
    background-color: #ff4757; /* 색상이 조금 더 밝아짐 */
    box-shadow: 0 0 25px rgba(255, 107, 107, 0.8); /* 외부로 퍼지는 광채 효과 */
    font-size: 2.5rem; /* 물음표 크기도 살짝 키움 */
}

/* 3. 정답이 공개된 후(revealed)의 호버 효과 (색다르게!) */
.marker.revealed:hover {
    transform: translate(-50%, -50%) scale(1.05); /* 정답은 아주 살짝만 반응 */
    box-shadow: 0 0 15px rgba(46, 204, 113, 0.6);
}

/* [추가] 정답을 맞혔을 때 '짠!' 하고 나타나는 애니메이션 */
@keyframes pop-in {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
}

.marker {
    animation: pop-in 0.6s ease-out; /* 페이지 로드 시 마커가 통통 튀어나옴 */
}</style>
</head>
<body>

    <h1>🔍 우리나라의 갯벌 탐험</h1>

    <div class="container">
        <div id="map-area">
            <canvas id="arrow-canvas"></canvas>
            <div class="marker" id="mark-서천" style="top: 68%; left: 41%;" onclick="checkAnswer('서천')">?</div>
            <div class="marker" id="mark-고창" style="top: 77%; left: 37%;" onclick="checkAnswer('고창')">?</div>
            <div class="marker" id="mark-신안" style="top: 87%; left: 37%;" onclick="checkAnswer('신안')">?</div>
            <div class="marker" id="mark-순천보성" style="top: 87%; left: 52%;" onclick="checkAnswer('순천보성')">?</div>

            <div class="static-label" id="lbl-옹진" style="top: 55%; left: 38%;"><span>옹진 장봉도</span></div>
            <div class="static-label" id="lbl-대부도" style="top: 60%; left: 41%;"><span>대부도</span></div>
            <div class="static-label" id="lbl-강진만" style="top: 95%; left: 45%;"><span>강진만</span></div>
            <div class="static-label" id="lbl-낙동강" style="top: 89%; left: 64%;"><span>낙동강</span></div>
        </div>

        <div id="control-panel">
            <h2 style="font-size: 1.8rem; color: var(--main-green); margin: 0;">지역 힌트</h2>
            <button class="region-btn" onclick="startHint('서천')">서천 갯벌</button>
            <button class="region-btn" onclick="startHint('고창')">고창 갯벌</button>
            <button class="region-btn" onclick="startHint('신안')">신안 갯벌</button>
            <button class="region-btn" onclick="startHint('순천보성')">순천/보성 갯벌</button>
            <div style="font-size: 1.1rem; color: #666; margin-top: auto;">힌트를 보고 지도에서 정답을 찾으세요!</div>
        </div>
    </div>

    <div id="hint-overlay"><div id="hint-content"><h2 id="hint-title" style="margin-top:0;">힌트</h2><img id="hint-img" src="" class="hint-img"><button id="next-btn" class="btn btn-next" onclick="nextHint()">다음 힌트</button><button class="btn btn-close" onclick="closeHint()">활동 창 닫기</button></div></div>
    <div id="answer-toast"></div>

    <script>
        const data = {
            '서천': { name: '서천 갯벌', prefix: './서천 갯벌', alias: '1번' },
            '고창': { name: '고창 갯벌', prefix: './고창 갯벌', alias: '2번' },
            '순천보성': { name: '순천보성 갯벌', prefix: './순천보성 갯벌', alias: '4번' },
            '신안': { name: '신안 갯벌', prefix: './신안 갯벌', alias: '3번' }
        };

        function initArrows() {
            const canvas = document.getElementById('arrow-canvas');
            const ctx = canvas.getContext('2d');
            const mapArea = document.getElementById('map-area');
            canvas.width = mapArea.clientWidth;
            canvas.height = mapArea.clientHeight;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#eb422c'; ctx.fillStyle = '#eb422c'; ctx.lineWidth = 1.5;
            coords.forEach(a => {
                const x1=(a.f[0]/100)*canvas.width, y1=(a.f[1]/100)*canvas.height;
                const x2=(a.t[0]/100)*canvas.width, y2=(a.t[1]/100)*canvas.height;
                const head=8, ang=Math.atan2(y2-y1, x2-x1);
                ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(x2,y2);
                ctx.lineTo(x2-head*Math.cos(ang-Math.PI/6), y2-head*Math.sin(ang-Math.PI/6));
                ctx.lineTo(x2-head*Math.cos(ang+Math.PI/6), y2-head*Math.sin(ang+Math.PI/6));
                ctx.closePath(); ctx.fill();
            });
        }

        window.addEventListener('resize', initArrows);
        window.addEventListener('load', initArrows);

        let currentLoc = ""; let currentStep = 1;
        function startHint(loc) {
            currentLoc = loc; currentStep = 1;
            document.getElementById('hint-overlay').style.display = 'flex';
            document.getElementById('next-btn').style.display = 'block';
            updateHintUI();
        }
        function updateHintUI() {
            const info = data[currentLoc];
            let fileName = (currentLoc === '서천' && currentStep === 1) ? `${info.prefix}.png` : `${info.prefix}${currentStep}.png`;
            document.getElementById('hint-img').src = fileName;
            document.getElementById('hint-title').innerText = `${info.alias} 지역 - 힌트 ${currentStep}`;
            if (currentStep === 5) document.getElementById('next-btn').style.display = 'none';
        }
        function nextHint() { if (currentStep < 5) { currentStep++; updateHintUI(); } }
        function closeHint() { document.getElementById('hint-overlay').style.display = 'none'; }
        function checkAnswer(loc) {
            const toast = document.getElementById('answer-toast');
            toast.innerText = `정답! [${data[loc].name}]`;
            toast.style.display = 'block';
            const marker = document.getElementById(`mark-${loc}`);
            marker.innerText = data[loc].name;
            marker.classList.add('revealed');
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }
    </script>
</body>
</html>
